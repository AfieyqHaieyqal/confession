<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF3EC;
    --plum:#5C4557;
    --ink:#3A2E36;
    --blush:#E3AEA9;
    --clay:#C98A7D;
    --gold:#C9A15A;
    --line: rgba(58,46,54,0.16);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100vh;
    background: radial-gradient(1200px 800px at 50% -10%, #F6E9DE 0%, var(--paper) 55%, #F1E2D6 100%);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    overflow-x:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .stage{
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding: 32px 18px;
  }

  /* ---------- ENVELOPE ---------- */
  .envelope-wrap{
    perspective: 1400px;
    width: min(340px, 88vw);
  }
  .envelope{
    position:relative;
    width:100%;
    aspect-ratio: 3 / 2;
    cursor:pointer;
    user-select:none;
  }
  .env-shadow{
    position:absolute; left:6%; right:6%; bottom:-14px; height:24px;
    background:radial-gradient(ellipse at center, rgba(92,69,87,0.28), transparent 70%);
    filter: blur(2px);
    transition: opacity .6s ease;
  }
  .env-back{
    position:absolute; inset:0;
    background: linear-gradient(160deg, #EFDCCB, #E7CDB6);
    border-radius:10px;
    box-shadow: 0 18px 40px -18px rgba(58,46,54,0.45);
  }
  .env-letter{
    position:absolute;
    left:6%; right:6%; top:8%;
    width:88%; height:96%;
    background: var(--paper);
    border-radius:6px;
    box-shadow: 0 6px 18px rgba(58,46,54,0.18);
    transform: translateY(0);
    transition: transform 1.1s cubic-bezier(.2,.9,.25,1);
    z-index:2;
    display:flex; align-items:flex-start; justify-content:center;
    padding-top: 14%;
    text-align:center;
  }
  .env-letter p{
    font-family:'Caveat', cursive;
    font-size: 1.35rem;
    color: var(--plum);
    padding: 0 12%;
    line-height:1.35;
  }
  .env-front-bottom{
    position:absolute; left:0; right:0; bottom:0; height:58%;
    background: linear-gradient(160deg, var(--clay), #B97666);
    clip-path: polygon(0 100%, 100% 100%, 100% 15%, 50% 55%, 0 15%);
    border-radius: 0 0 10px 10px;
    z-index:3;
  }
  .env-flap{
    position:absolute; left:0; right:0; top:0; height:58%;
    background: linear-gradient(200deg, var(--blush), var(--clay));
    clip-path: polygon(0 0, 100% 0, 50% 62%);
    transform-origin: top center;
    transition: transform 1s cubic-bezier(.2,.9,.25,1);
    z-index:4;
    border-radius: 10px 10px 0 0;
  }
  .seal{
    position:absolute; left:50%; top:38%;
    transform: translate(-50%,-50%);
    width:52px; height:52px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #DDB877, var(--gold) 60%, #A87E3B 100%);
    box-shadow: 0 4px 10px rgba(58,46,54,0.35), inset 0 2px 3px rgba(255,255,255,0.4);
    z-index:5;
    display:flex; align-items:center; justify-content:center;
    transition: transform .4s ease, opacity .5s ease;
  }
  .seal svg{ width:24px; height:24px; opacity:.85; }

  .hint{
    text-align:center;
    margin-top:26px;
    font-size:0.92rem;
    color: var(--plum);
    opacity:0.75;
    letter-spacing:0.02em;
    transition: opacity .5s ease;
  }

  /* opened state */
  .envelope.open .env-flap{ transform: rotateX(180deg); }
  .envelope.open .seal{ transform: translate(-50%,-50%) scale(0); opacity:0; }
  .envelope.open .env-letter{ transform: translateY(-78%); }
  .envelope.open .env-shadow{ opacity:0.5; }

  /* ---------- LETTER PAGE ---------- */
  .letter-page{
    width: min(480px, 92vw);
    background: var(--paper);
    border-radius: 14px;
    box-shadow: 0 30px 60px -20px rgba(58,46,54,0.35);
    padding: 40px 34px 34px;
    opacity:0;
    transform: translateY(24px);
    transition: opacity .8s ease .2s, transform .8s ease .2s;
    position:relative;
  }
  .letter-page.show{ opacity:1; transform: translateY(0); }

  .letter-page::before{
    content:"";
    position:absolute; inset:10px;
    border:1px solid var(--line);
    border-radius:8px;
    pointer-events:none;
  }

  .greeting{
    font-family:'Caveat', cursive;
    font-size: 2rem;
    color: var(--plum);
    margin: 0 0 6px;
  }
  .body-text{
    font-size:1rem;
    line-height:1.75;
    color: var(--ink);
    margin: 0 0 14px;
    font-weight:300;
  }
  .body-text b{ font-weight:600; color:var(--plum); }
  .signoff{
    font-family:'Caveat', cursive;
    font-size:1.6rem;
    color:var(--plum);
    margin-top:22px;
  }
  .divider{
    width:48px; height:2px; background:var(--blush);
    border:none; border-radius:2px;
    margin: 22px 0;
  }
  .note{
    font-size:0.85rem;
    color: var(--plum);
    opacity:0.7;
    line-height:1.6;
  }
  .name-tag{
    text-align:center;
    margin-top:28px;
    font-size:0.78rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color: var(--plum);
    opacity:0.55;
  }

  /* ---------- YES / NO ---------- */
  .ask{
    margin-top: 28px;
    text-align:center;
  }
  .ask-q{
    font-family:'Caveat', cursive;
    font-size:1.5rem;
    color: var(--plum);
    margin: 0 0 18px;
  }
  .btn-field{
    position:relative;
    height: 120px;
    width:100%;
  }
  .btn{
    border:none;
    border-radius: 999px;
    padding: 13px 28px;
    font-family:'Nunito', sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
    box-shadow: 0 8px 18px -6px rgba(58,46,54,0.35);
  }
  .btn-yes{
    background: linear-gradient(150deg, var(--clay), var(--blush));
    color:#fff;
    position:absolute;
    left:50%; top:50%;
    transform: translate(-88%, -50%);
  }
  .btn-no{
    background: var(--paper);
    color: var(--plum);
    border:1.5px solid var(--line);
    position:absolute;
    left:50%; top:50%;
    transform: translate(18%, -50%);
    transition: left .18s ease, top .18s ease, transform .18s ease;
  }
  .answer{
    font-family:'Caveat', cursive;
    font-size:1.6rem;
    color: var(--plum);
    text-align:center;
    margin-top:10px;
    opacity:0;
    transform: translateY(6px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .answer.show{ opacity:1; transform:translateY(0); }

  .taunt{
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%,-46px);
    background: var(--plum);
    color:#fff;
    font-family:'Caveat', cursive;
    font-size:1.05rem;
    padding: 6px 14px;
    border-radius: 14px;
    white-space:nowrap;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease, transform .25s ease;
    z-index:6;
  }
  .taunt::after{
    content:"";
    position:absolute; left:50%; bottom:-5px;
    width:10px; height:10px;
    background: var(--plum);
    transform: translateX(-50%) rotate(45deg);
  }
  .taunt.show{ opacity:1; }

  @media (prefers-reduced-motion: reduce){
    .env-flap, .env-letter, .seal, .letter-page{ transition: none !important; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <div>
    <div class="envelope-wrap">
      <div class="envelope" id="envelope">
        <div class="env-shadow"></div>
        <div class="env-back"></div>
        <div class="env-letter"><p>for you 🤍</p></div>
        <div class="env-front-bottom"></div>
        <div class="env-flap">
          <div class="seal">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6">
              <path d="M12 21s-7.5-4.6-9.7-9.1C.8 8.6 2.4 5 6 5c2 0 3.4 1.1 4 2.2C10.6 6.1 12 5 14 5c3.6 0 5.2 3.6 3.7 6.9C15.5 16.4 12 21 12 21z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
    <p class="hint" id="hint">tap to open</p>
  </div>

</div>

<script>
  const envelope = document.getElementById('envelope');
  const hint = document.getElementById('hint');
  const stage = document.getElementById('stage');

  envelope.addEventListener('click', () => {
    if (envelope.classList.contains('open')) return;
    envelope.classList.add('open');
    hint.style.opacity = '0';

    setTimeout(() => {
      // build the letter page and swap the view in
      stage.innerHTML = '';
      const page = document.createElement('div');
      page.className = 'letter-page';
      page.innerHTML = `
        <p class="greeting">Hi Liyana,</p>
        <p class="body-text">
          This is probably a little random since we don't actually know each other —
          I actually know of you through a friend of mine, who I found out is a friend
          of yours too her name is Maisara. I've just come across you here and there since, and I wanted
          to be upfront about it instead of just quietly scrolling past.
        </p>
        <p class="body-text">
          From what I've seen, you seem like <b>someone genuinely worth knowing</b>,
          and I wanted to say that honestly. I'm not expecting anything from this —
          I just didn't want to keep it to myself and never say anything at all.
        </p>
        <p class="body-text">
          I'm a bit of an introvert, so even this took some courage 😅.
          If it's okay with you, I'd love to just start as <b>friends</b> and get to know
          each other properly — completely no pressure, whatever pace feels comfortable for you.
        </p>
        <hr class="divider">
        <p class="note">
          Take your time with this. However you feel about it, it's okay —
          I just wanted to be real with you.
        </p>
        <p class="signoff">— Mr AH</p>

        <div class="ask">
          <p class="ask-q">so... want to be my friend? 🤍</p>
          <div class="btn-field" id="btnField">
            <button class="btn btn-yes" id="btnYes">Yes 🤍</button>
            <button class="btn btn-no" id="btnNo">No</button>
            <div class="taunt" id="taunt">why no? 🥺</div>
          </div>
          <p class="answer" id="answerText"></p>
        </div>

        <p class="name-tag">sent quietly, with honesty</p>
      `;
      stage.appendChild(page);
      requestAnimationFrame(() => page.classList.add('show'));

      // ---- dodging "no" button ----
      const field = page.querySelector('#btnField');
      const noBtn = page.querySelector('#btnNo');
      const yesBtn = page.querySelector('#btnYes');
      const answerText = page.querySelector('#answerText');
      const taunt = page.querySelector('#taunt');

      const taunts = [
        "why no? 🥺",
        "nuh uh, try again",
        "not that one 😝",
        "come on now",
        "it's hiding on purpose",
        "yes is right there though",
        "give it a chance 🤍"
      ];
      let taunted = 0;

      function dodge(){
        const fw = field.clientWidth, fh = field.clientHeight;
        const bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
        const maxX = fw - bw - 8, maxY = fh - bh - 8;
        const x = Math.random() * maxX - maxX/2;
        const y = Math.random() * maxY - maxY/2;
        noBtn.style.left = `calc(50% + ${x}px)`;
        noBtn.style.top = `calc(50% + ${y}px)`;
        noBtn.style.transform = 'translate(0,0)';

        taunt.textContent = taunts[taunted % taunts.length];
        taunted++;
        taunt.style.left = noBtn.style.left;
        taunt.style.top = noBtn.style.top;
        taunt.style.transform = 'translate(-50%, -46px)';
        taunt.classList.add('show');
        clearTimeout(taunt._t);
        taunt._t = setTimeout(() => taunt.classList.remove('show'), 1100);
      }

      noBtn.addEventListener('mouseenter', dodge);
      noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); }, {passive:false});
      noBtn.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

      yesBtn.addEventListener('click', () => {
        field.style.display = 'none';
        answerText.textContent = 'yay 🤍 thank you for giving this a chance.';
        answerText.classList.add('show');
      });
    }, 950);
  });
</script>

</body>
</html>
